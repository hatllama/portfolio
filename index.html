<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaki Pugh-Fradot — Game Designer & Developer</title>
<meta name="description" content="Game design and development portfolio — playable prototypes, systems design, and full-stack engineering.">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="wrap">
    <div class="nav-name" id="nav-name">—</div>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">☰</button>
    <ul class="nav-links" id="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#games">Games</a></li>
      <li><a href="#tabletop">Tabletop</a></li>
      <li><a href="#technical">Technical</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#links">Links</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </div>
</nav>

<header class="hero">
  <div class="wrap">
    <div class="hero-eyebrow" id="hero-eyebrow">Portfolio</div>
    <h1 id="hero-name">—</h1>
    <p class="hero-tagline" id="hero-tagline"></p>
    <div class="hero-meta" id="hero-meta"></div>
  </div>
</header>

<section id="about">
  <div class="wrap">
    <div class="section-head"><h2><span class="mark">&#8225;</span> About</h2><div class="rule"></div></div>
    <p class="about-text" id="about-text"></p>
  </div>
</section>

<section id="games">
  <div class="wrap">
    <div class="section-head"><h2><span class="mark">&#8225;</span> Featured Games</h2><div class="rule"></div></div>
    <div class="grid cols-3" id="games-grid"></div>
  </div>
</section>

<section id="tabletop">
  <div class="wrap">
    <div class="section-head"><h2><span class="mark">&#8225;</span> Tabletop &amp; Worldbuilding</h2><div class="rule"></div></div>
    <p class="section-lede" id="tabletop-intro"></p>
    <div id="campaigns"></div>
  </div>
</section>

<section id="technical">
  <div class="wrap">
    <div class="section-head"><h2><span class="mark">&#8225;</span> Technical Projects</h2><div class="rule"></div></div>
    <div class="grid cols-2" id="technical-grid"></div>
  </div>
</section>

<section id="experience">
  <div class="wrap">
    <div class="section-head"><h2><span class="mark">&#8225;</span> Experience</h2><div class="rule"></div></div>
    <div id="experience-list"></div>
  </div>
</section>

<section id="skills">
  <div class="wrap">
    <div class="section-head"><h2><span class="mark">&#8225;</span> Skills</h2><div class="rule"></div></div>
    <div class="skills-grid" id="skills-grid"></div>
  </div>
</section>

<section id="education">
  <div class="wrap">
    <div class="section-head"><h2><span class="mark">&#8225;</span> Education</h2><div class="rule"></div></div>
    <div id="education-list"></div>
  </div>
</section>

<footer id="contact">
  <div class="wrap">
    <div class="rule-full"></div>
    <a class="resume-btn" id="resume-link" href="#">Download Résumé</a>
    <div class="fine" id="footer-fine"></div>
  </div>
</footer>

<section id="links">
  <div class="wrap">
    <div class="section-head"><h2><span class="mark">&#8225;</span> Links</h2><div class="rule"></div></div>
    <div class="links-row" id="links-row"></div>
  </div>
</section>

<div class="lightbox" id="lightbox" aria-hidden="true">
  <img id="lightbox-img" src="" alt="">
</div>

<script src="content.js"></script>
<script src="app.js"></script>
</body>
</html>
